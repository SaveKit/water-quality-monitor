AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Water Quality Monitoring System Infrastructure

Resources:
  # DynamoDB Table
  WaterQualityDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: WaterQualityData
      # ตั้งค่า Primary Key (ใช้สำหรับค้นหา)
      AttributeDefinitions:
        - AttributeName: node_id
          AttributeType: S # String (เช่น "Node01")
        - AttributeName: timestamp
          AttributeType: N # Number (เวลาแบบ Unix Timestamp)
      KeySchema:
        - AttributeName: node_id
          KeyType: HASH # Partition Key (จัดกลุ่มตาม Node)
        - AttributeName: timestamp
          KeyType: RANGE # Sort Key (เรียงลำดับตามเวลา)
      # ใช้โหมดจ่ายเงินตามการใช้งานจริง (เหมาะกับโปรเจกต์ที่มีทราฟฟิกน้อย)
      BillingMode: PAY_PER_REQUEST

  # สร้าง IAM Role ให้ IoT Core มีสิทธิ์เขียนข้อมูลลง DynamoDB
  IoTDynamoDBWriteRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBWriteAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt WaterQualityDataTable.Arn

  # สร้าง AWS IoT Rule เพื่อดักจับ MQTT
  WaterQualityIoTRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: SaveWaterQualityToDynamoDB
      TopicRulePayload:
        # ใช้เครื่องหมาย + เพื่อรับทุก Node และดึงเวลา (Timestamp) เข้าไปในข้อมูลด้วย
        Sql: "SELECT *, timestamp() AS timestamp FROM 'water_quality/+/data'"
        Actions:
          - DynamoDBv2:
              PutItem:
                TableName: !Ref WaterQualityDataTable
              RoleArn: !GetAtt IoTDynamoDBWriteRole.Arn
        RuleDisabled: false
